<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pitzi Labs — Production that shows up.</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="design-system/colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--color-bg); }
  body { overflow-x: hidden; }
  body[data-density="compact"] section { padding-top: 64px !important; padding-bottom: 64px !important; }
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }
  ::selection { background: var(--color-accent); color: #faf7f2; }

  /* ---- Print styles ---- */
  @page { size: A4 portrait; margin: 0.5cm; }
  @media print {
    html, body {
      background: var(--color-bg) !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Hide things that don't belong in print */
    [data-tweaks-panel], .__tweaks-panel { display: none !important; }
    /* Avoid splitting cards / sections across pages where possible */
    section, header, footer { break-inside: avoid; page-break-inside: avoid; }
    /* Remove animations & transitions */
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
    /* Keep major sections on their own page so each chunk is legible */
    main > section, body > div > section { break-before: page; }
    header#top { break-after: page; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/Brand.jsx"></script>
<script type="text/babel" src="components/Shared.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/StatusStrip.jsx"></script>
<script type="text/babel" src="components/Services.jsx"></script>
<script type="text/babel" src="components/CaseStudy.jsx"></script>
<script type="text/babel" src="components/Principles.jsx"></script>
<script type="text/babel" src="components/Experience.jsx"></script>
<script type="text/babel" src="components/Contact.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tweaks, setTweaks] = useState(window.TWEAKS_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty("--color-accent", tweaks.accent);
    document.body.setAttribute("data-density", tweaks.density);
  }, [tweaks.accent, tweaks.density]);

  return (
    <div data-screen-label="Pitzi Labs Landing">
      <NavBar active="Practice" />
      <Hero variant={tweaks.heroVariant} />
      {tweaks.showStatusStrip && <StatusStrip />}
      <ServicesGrid />
      <CaseStudy />
      <Principles />
      <Experience />
      <Contact />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// Auto-print once fonts and layout are ready
(async () => {
  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }
  } catch (e) {}
  // Wait for React to commit + a small safety delay
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  await new Promise(r => setTimeout(r, 500));
  window.print();
})();
</script>
</body>
</html>
