<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pitzi Labs — Business cards</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="design-system/colors_and_type.css" />
<style>
  html, body { margin: 0; background: #2a2724; }
  body { overflow: hidden; }
  ::selection { background: var(--color-accent); color: #faf7f2; }
  @keyframes card-pulse {
    0%, 100% { box-shadow: 0 0 0 3px currentColor; opacity: 1; }
    50%      { box-shadow: 0 0 0 6px transparent;  opacity: 0.95; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="cards/CardPrimitives.jsx"></script>
<script type="text/babel" src="cards/CardV1.jsx"></script>
<script type="text/babel" src="cards/CardV2.jsx"></script>
<script type="text/babel" src="cards/CardV3.jsx"></script>
<script type="text/babel" src="cards/CardV4.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

const CARD_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#e08438",
  "nameVariant": "mono"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(CARD_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty("--card-accent", t.accent);
  }, [t.accent]);

  const PAIR_W = CARD_W * 2 + 32;     // two cards + gap
  const PAIR_H = CARD_H + 32;         // card + caption row

  const cards = [
    { id: "v1", label: "01 · Status indicator",   front: <CardV1Front nameVariant={t.nameVariant} />, back: <CardV1Back /> },
    { id: "v2", label: "02 · Terminal / runbook", front: <CardV2Front nameVariant={t.nameVariant} />, back: <CardV2Back /> },
    { id: "v3", label: "03 · Diecut accent",      front: <CardV3Front nameVariant={t.nameVariant} />, back: <CardV3Back /> },
    { id: "v4", label: "04 · Live-ops console",   front: <CardV4Front nameVariant={t.nameVariant} />, back: <CardV4Back /> },
  ];

  // Default tweak accent should match the new brand orange.
  React.useEffect(() => {
    if (t.accent === "#c4533a") setTweak("accent", "#e08438");
  }, []);

  return (
    <DesignCanvas title="Pitzi Labs — Business cards" subtitle="3.5 × 2 in · front + back · drag to pan, scroll to zoom">
      <DCSection id="cards" title="Variations">
        {cards.map(c => (
          <DCArtboard key={c.id} id={c.id} label={c.label} width={PAIR_W} height={PAIR_H}>
            <CardPair front={c.front} back={c.back} />
          </DCArtboard>
        ))}
      </DCSection>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent">
          <TweakColor
            value={t.accent}
            onChange={v => setTweak("accent", v)}
            options={["#e08438", "#c66f24", "#1c3552", "#7a7340", "#c54a2a"]}
          />
        </TweakSection>
        <TweakSection title="Name treatment">
          <TweakRadio
            value={t.nameVariant}
            onChange={v => setTweak("nameVariant", v)}
            options={[
              { value: "display", label: "Display" },
              { value: "mono",    label: "Mono" },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
